<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splyto Friend Link</title>
  <style>
    :root {
      --bg: #040607;
      --card: #0c1611;
      --text: #f3f8f5;
      --muted: #98ab9f;
      --accent: #57b487;
      --accent-2: #2eaf6e;
      --stroke: rgba(87, 180, 135, 0.24);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(720px 360px at 82% 0%, rgba(46, 175, 110, 0.26), transparent 58%),
        linear-gradient(180deg, var(--bg), #07110d 56%, var(--card));
      color: var(--text);
    }

    .card {
      width: min(100%, 460px);
      border: 1px solid var(--stroke);
      border-radius: 24px;
      background: rgba(12, 22, 17, 0.84);
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 25px;
      line-height: 1.16;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .code {
      margin: 16px 0 18px;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, 0.04);
      word-break: break-word;
      font-size: 14px;
      color: #d9e8df;
    }

    button,
    a.action {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 46px;
      border-radius: 15px;
      border: 0;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
    }

    button.primary {
      color: #07110d;
      background: linear-gradient(180deg, #b9f0d5, var(--accent));
    }

    .hint {
      margin-top: 13px;
      font-size: 12px;
      color: #83988d;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Opening Splyto...</h1>
    <p>Accept or send a friend request in the app.</p>
    <div class="code" id="friendCode">Friend link ready</div>
    <button id="openAppBtn" type="button" class="primary">Open in app</button>
    <div class="hint">Friend links work when you are logged in.</div>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = (params.get('code') || params.get('friend_code') || '').trim();
      var legacyUid = (params.get('uid') || params.get('user_id') || params.get('friend') || '').trim();
      var codeEl = document.getElementById('friendCode');
      var openBtn = document.getElementById('openAppBtn');
      var ua = navigator.userAgent.toLowerCase();
      var isAndroid = ua.indexOf('android') >= 0;
      var appQuery = code
        ? ('code=' + encodeURIComponent(code))
        : (legacyUid ? ('uid=' + encodeURIComponent(legacyUid)) : '');

      codeEl.textContent = appQuery ? 'Private friend link ready' : 'Friend link missing';

      function openApp() {
        if (!appQuery) return;
        if (isAndroid) {
          window.location.href =
            'intent://friend?' + appQuery +
            '#Intent;scheme=splyto;package=com.tripsplit.app.tripsplit;end';
          window.setTimeout(function () {
            window.location.href = 'splyto://friend?' + appQuery;
          }, 650);
          return;
        }
        window.location.href = 'splyto://friend?' + appQuery;
        window.setTimeout(function () {
          window.location.href = 'tripsplit://friend?' + appQuery;
        }, 650);
      }

      openBtn.addEventListener('click', openApp);
      if (appQuery) {
        window.setTimeout(openApp, 220);
      }
    })();
  </script>
</body>
</html>
