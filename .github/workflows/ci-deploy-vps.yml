name: CI and Deploy VPS

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target"
        required: true
        default: "no"
        type: choice
        options:
          - no
          - prod

permissions:
  contents: read

concurrency:
  group: ci-deploy-vps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Run PHPUnit
        run: php vendor/bin/phpunit

  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend-tests
    if: |
      github.event_name != 'pull_request' &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'prod') ||
        (github.event_name == 'push' && vars.AUTO_DEPLOY_VPS == 'true')
      )
    environment: production
    steps:
      - name: Check required deploy secrets
        id: precheck
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          set -euo pipefail
          missing=""
          [ -n "${VPS_HOST:-}" ] || missing="$missing VPS_HOST"
          [ -n "${VPS_USER:-}" ] || missing="$missing VPS_USER"
          [ -n "${VPS_SSH_PRIVATE_KEY:-}" ] || missing="$missing VPS_SSH_PRIVATE_KEY"
          [ -n "${VPS_SSH_KNOWN_HOSTS:-}" ] || missing="$missing VPS_SSH_KNOWN_HOSTS"
          [ -n "${API_BASE_URL:-}" ] || missing="$missing API_BASE_URL"

          if [ -n "$missing" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing# }" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
          fi

      - name: Start SSH agent
        if: steps.precheck.outputs.ready == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add pinned VPS host key
        if: steps.precheck.outputs.ready == 'true'
        shell: bash
        env:
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_SSH_KNOWN_HOSTS:-}" ]; then
            echo "Missing required secret: VPS_SSH_KNOWN_HOSTS"
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy latest main on VPS
        if: steps.precheck.outputs.ready == 'true'
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_USER:-}" ]; then
            echo "Missing required secret: VPS_USER"
            exit 1
          fi
          APP_DIR="${VPS_APP_DIR:-/var/www/splyto}"
          ssh \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -p "${VPS_PORT:-22}" \
            "$VPS_USER@$VPS_HOST" \
            "APP_DIR='$APP_DIR' bash -s" <<'EOF'
            set -euo pipefail
            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR" || true
            git fetch origin
            git checkout main
            git reset --hard origin/main

            mkdir -p uploads uploads/receipts uploads/avatars uploads/trips uploads/feedback logs
            if id www-data >/dev/null 2>&1; then
              chown -R www-data:www-data uploads logs || true
            fi
            chmod -R ug+rwX uploads logs || true

            cd api
            php -l api.php >/dev/null
            php -l lib/actions/trips_actions.php >/dev/null
            php -l lib/actions/workspace_actions.php >/dev/null
            php -l lib/actions/expenses_actions.php >/dev/null
            php -l lib/actions/settlements_actions.php >/dev/null
            php -l lib/actions/settlements/settlements_balance.php >/dev/null
            php -l lib/actions/settlements/settlements_algorithm.php >/dev/null
            php -l lib/helpers/helper_expense_math.php >/dev/null
          EOF

      - name: Health check
        if: steps.precheck.outputs.ready == 'true'
        shell: bash
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${API_BASE_URL:-}" ]; then
            echo "Missing required secret: API_BASE_URL (example: https://splyto.eu)"
            exit 1
          fi

          unknown_status="$(curl -sS --max-time 20 -o /tmp/unknown.json -w '%{http_code}' "$API_BASE_URL/api/api.php?action=unknown")"
          cat /tmp/unknown.json
          echo
          if [ "$unknown_status" != "404" ]; then
            echo "Health check failed: unknown action expected 404, got $unknown_status"
            exit 1
          fi

          me_status="$(curl -sS --max-time 20 -o /tmp/me.json -w '%{http_code}' "$API_BASE_URL/api/api.php?action=me")"
          cat /tmp/me.json
          echo
          if [ "$me_status" != "401" ]; then
            echo "Health check failed: me action expected 401, got $me_status"
            exit 1
          fi

      - name: Deploy skipped (missing secrets)
        if: steps.precheck.outputs.ready != 'true'
        shell: bash
        run: |
          echo "Deploy skipped because required secrets are missing: ${{ steps.precheck.outputs.missing }}"
